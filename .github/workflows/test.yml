name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 matches the devcontainer; 3.12 matches the Streamlit Cloud
        # default; 3.13 covers the local-dev floor noted in REVIEW.md so a
        # 3.13-only regression would be caught in CI.
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile check
        run: |
          python -m py_compile pipeline.py app.py config.py validate.py

      - name: Run classifier unit tests
        run: python -m pytest tests/ -v
