name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 matches the devcontainer; 3.12 matches the Streamlit Cloud
        # default; 3.13 covers the local-dev floor noted in REVIEW.md so a
        # 3.13-only regression would be caught in CI.
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Compile check
        run: |
          python -m py_compile pipeline.py app.py config.py validate.py

      - name: Lint (ruff)
        run: |
          # Hard gate: any error here fails CI. Catches:
          # F821 undefined-names (real bugs — caught the focus_label
          # NameError in commit ____),
          # F401 unused imports, F841 unused locals,
          # E701/E702 multiple-statements-per-line, E741 ambiguous names,
          # F541 f-strings without placeholders.
          ruff check app.py pipeline.py config.py validate.py

      - name: Run classifier unit tests + coverage gate
        run: |
          # Coverage gate: pipeline.py must stay at >=75% to merge.
          # Was 80% as of 2026-05-07 baseline; the floor leaves 5% of
          # slack for pipeline refactors that might temporarily expose
          # less-covered branches without blocking the PR. Tighten
          # toward 85% over time.
          python -m pytest tests/ -v \
            --cov=pipeline \
            --cov-report=term \
            --cov-fail-under=75
